<html>
<head>
    <meta charset="UTF-8">
    <title>API Explorer</title>
    <link href='css/swagger-ui.css' rel='stylesheet'/>
    <script src='libs/swagger-ui-bundle.js'></script>
    <script>
        // Plugin to allow host override in the API specification
        const ApiHostMutatorPlugin = (system) => ({
            rootInjects: {
                setHost: (host) => {
                    const jsonSpec = system.getState().toJSON().spec.json;
                    const newJsonSpec = Object.assign({}, jsonSpec, { host });
                    return system.specActions.updateJsonSpec(newJsonSpec);
                }
            }
        });
        window.onload = function() {
            const params = new URLSearchParams(window.location.search);
            const url = params.get("url") || "/openidm/?_api";
            const swaggerUi = SwaggerUIBundle({
                url: url,
                validatorUrl: null,
                dom_id: "#swagger-ui",
                presets: [SwaggerUIBundle.presets.apis],
                defaultModelRendering: 'schema',
                supportedSubmitMethods: ['get', 'post', 'put', 'delete', 'patch'],
                plugins: [ApiHostMutatorPlugin],
                onComplete: function () {
                    swaggerUi.setHost(window.location.hostname + ':' + window.location.port);
                },
                requestInterceptor: (request) => {
                    request.headers['X-Requested-With'] = 'Swagger-UI';
                    const url = new URL(request.url, window.location);
                    // CREST API uses URL fragment for path uniqueness
                    // We want to remove the fragment and fix the parameters appended by Swagger UI
                    if (url.hash && url.hash.indexOf("?") > 0) {
                        url.search = url.hash.substring(url.hash.indexOf("?"));
                    }
                    url.hash = "";
                    request.url = url.toString();
                    return request;
                },
                responseInterceptor: (response) => {
                    if (response && response.status === 401) {
                        window.top.location.replace('/');
                    }
                }
            });
        };
    </script>
</head>
<body style="margin: 1em;">
    <div id="swagger-ui"></div>
</body>
</html>
